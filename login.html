<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.erro-animacao {
  animation: tremer 0.3s;
}

@keyframes tremer {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body class="body-login imglogin">


<div class="bordalogin">
  <h1 class="textlogin">Login</h1>

  <input 
  class="caixalogin mx-auto mb-5"
  type="text"
  id="nomeUsuario"
  placeholder="Digite seu nome"
  style="text-align: center;">

  <button class="btn btn-primary caixaentrar" id="btnLogin">Entrar</button>

  <p id="erroLogin" class="text-danger mt-2"></p>
</div>

<script src="login.js" defer></script>

</body>
</html>
